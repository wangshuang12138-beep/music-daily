<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>xca's pick | 每日音乐推荐</title>
  <link rel="icon" href="https://wangshuang12138-beep.github.io/xca-blog/logo-xca-square.svg">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --glass-bg: rgba(255, 255, 255, 0.08);
      --glass-border: rgba(255, 255, 255, 0.15);
      --text-primary: #ffffff;
      --text-secondary: rgba(255, 255, 255, 0.7);
      --accent: #ff6b6b;
    }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', sans-serif;
      overflow: hidden;
    }

    body {
      background: #0a0a0a;
      color: var(--text-primary);
    }

    /* 背景图 */
    .bg-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -2;
    }

    .bg-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: blur(60px) brightness(0.4);
      transform: scale(1.1);
      transition: opacity 0.6s ease;
    }

    .bg-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(
        180deg,
        rgba(0,0,0,0.3) 0%,
        rgba(0,0,0,0.1) 30%,
        rgba(0,0,0,0.4) 70%,
        rgba(0,0,0,0.7) 100%
      );
      z-index: -1;
    }

    /* 顶部导航 */
    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 100;
    }

    .date-nav {
      display: flex;
      align-items: center;
      gap: 16px;
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 30px;
      padding: 10px 20px;
    }

    .nav-btn {
      width: 32px;
      height: 32px;
      border: none;
      background: transparent;
      color: var(--text-primary);
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      transition: background 0.2s;
    }

    .nav-btn:hover {
      background: rgba(255,255,255,0.1);
    }

    .nav-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .current-date {
      font-size: 15px;
      font-weight: 500;
      min-width: 100px;
      text-align: center;
      cursor: pointer;
      user-select: none;
    }

    .tag-filter-btn {
      width: 40px;
      height: 40px;
      border: none;
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 50%;
      color: var(--text-primary);
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .tag-filter-btn:hover,
    .tag-filter-btn.active {
      background: rgba(255,255,255,0.2);
    }

    /* 主内容区 */
    .main-content {
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 100px 20px 120px;
    }

    /* 唱片区域 */
    .album-section {
      position: relative;
      margin-bottom: 40px;
    }

    .album-container {
      position: relative;
      width: 280px;
      height: 280px;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    .album-cover {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* 唱片旋转动画 */
    .album-container.playing::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 80px;
      height: 80px;
      background: rgba(0,0,0,0.6);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      backdrop-filter: blur(4px);
    }

    .playing-indicator {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: none;
      z-index: 10;
    }

    .album-container.playing .playing-indicator {
      display: flex;
      gap: 4px;
      align-items: flex-end;
      height: 24px;
    }

    .bar {
      width: 4px;
      background: white;
      border-radius: 2px;
      animation: sound 0.8s ease-in-out infinite;
    }

    .bar:nth-child(1) { height: 12px; animation-delay: 0s; }
    .bar:nth-child(2) { height: 20px; animation-delay: 0.1s; }
    .bar:nth-child(3) { height: 16px; animation-delay: 0.2s; }
    .bar:nth-child(4) { height: 24px; animation-delay: 0.3s; }

    @keyframes sound {
      0%, 100% { transform: scaleY(0.5); }
      50% { transform: scaleY(1); }
    }

    /* 播放按钮 */
    .play-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .album-container:hover .play-overlay {
      opacity: 1;
    }

    .play-icon {
      width: 60px;
      height: 60px;
      background: rgba(255,255,255,0.95);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      color: #333;
    }

    /* 歌曲信息 */
    .song-info {
      text-align: center;
      margin-bottom: 24px;
    }

    .song-title {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }

    .song-artist {
      font-size: 16px;
      color: var(--text-secondary);
      margin-bottom: 16px;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
    }

    .tag {
      padding: 6px 14px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      font-size: 13px;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.2s;
    }

    .tag:hover,
    .tag.active {
      background: rgba(255,255,255,0.2);
      color: var(--text-primary);
    }

    /* 推荐卡片 */
    .recommend-card {
      max-width: 420px;
      width: 100%;
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 24px;
      margin-bottom: 20px;
    }

    .quote {
      font-size: 18px;
      font-weight: 600;
      line-height: 1.6;
      margin-bottom: 16px;
      color: var(--text-primary);
    }

    .quote::before {
      content: '"';
      font-size: 24px;
      color: var(--accent);
      margin-right: 4px;
    }

    .quote::after {
      content: '"';
      font-size: 24px;
      color: var(--accent);
      margin-left: 4px;
    }

    .description {
      font-size: 14px;
      line-height: 1.8;
      color: var(--text-secondary);
    }

    /* 播放器 */
    .player-section {
      width: 100%;
      max-width: 420px;
    }

    .player-container {
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      overflow: hidden;
    }

    .player-header {
      padding: 12px 16px;
      background: rgba(0,0,0,0.2);
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--text-secondary);
    }

    .player-header img {
      width: 16px;
      height: 16px;
    }

    .player-iframe {
      width: 100%;
      height: 66px;
      border: none;
      display: block;
    }

    /* 外部链接 */
    .external-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 12px;
      padding: 8px 16px;
      background: transparent;
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      color: var(--text-secondary);
      font-size: 13px;
      text-decoration: none;
      transition: all 0.2s;
    }

    .external-link:hover {
      background: rgba(255,255,255,0.1);
      color: var(--text-primary);
    }

    /* Logo 水印 */
    .logo-watermark {
      position: fixed;
      bottom: 24px;
      left: 24px;
      z-index: 100;
      opacity: 0.3;
      transition: opacity 0.3s;
    }

    .logo-watermark:hover {
      opacity: 1;
    }

    .logo-watermark img {
      width: 40px;
      height: 40px;
      filter: brightness(0) invert(1);
    }

    .logo-tooltip {
      position: absolute;
      bottom: 100%;
      left: 50%;
      transform: translateX(-50%) translateY(-8px);
      padding: 6px 12px;
      background: rgba(0,0,0,0.8);
      border-radius: 6px;
      font-size: 12px;
      color: white;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }

    .logo-watermark:hover .logo-tooltip {
      opacity: 1;
    }

    /* 标签筛选面板 */
    .filter-panel {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.9);
      backdrop-filter: blur(20px);
      z-index: 200;
      display: none;
      flex-direction: column;
      padding: 20px;
    }

    .filter-panel.active {
      display: flex;
    }

    .filter-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      padding-top: 20px;
    }

    .filter-title {
      font-size: 24px;
      font-weight: 700;
    }

    .close-filter {
      width: 40px;
      height: 40px;
      border: none;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 50%;
      color: white;
      font-size: 20px;
      cursor: pointer;
    }

    .filter-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 30px;
    }

    .filter-tag {
      padding: 10px 20px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 25px;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .filter-tag:hover,
    .filter-tag.active {
      background: rgba(255,255,255,0.2);
      border-color: rgba(255,255,255,0.4);
    }

    .filter-results {
      flex: 1;
      overflow-y: auto;
    }

    .result-item {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      margin-bottom: 12px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .result-item:hover {
      background: rgba(255,255,255,0.15);
    }

    .result-cover {
      width: 60px;
      height: 60px;
      border-radius: 6px;
      object-fit: cover;
    }

    .result-info {
      flex: 1;
    }

    .result-title {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .result-artist {
      font-size: 13px;
      color: var(--text-secondary);
    }

    .result-date {
      font-size: 12px;
      color: var(--text-secondary);
    }

    /* 加载状态 */
    .loading {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: #0a0a0a;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
    }

    .loading.hidden {
      display: none;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* 日期选择器 */
    .date-picker {
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      margin-top: 10px;
      background: rgba(0,0,0,0.9);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      padding: 16px;
      display: none;
      min-width: 280px;
    }

    .date-picker.active {
      display: block;
    }

    .date-picker-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .date-picker-title {
      font-size: 14px;
      font-weight: 600;
    }

    .date-picker-nav {
      display: flex;
      gap: 8px;
    }

    .date-picker-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
    }

    .day-label {
      text-align: center;
      font-size: 11px;
      color: var(--text-secondary);
      padding: 8px 0;
    }

    .day {
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      border-radius: 50%;
      cursor: pointer;
      transition: all 0.2s;
    }

    .day:hover {
      background: rgba(255,255,255,0.1);
    }

    .day.today {
      background: var(--accent);
    }

    .day.has-music {
      position: relative;
    }

    .day.has-music::after {
      content: '';
      position: absolute;
      bottom: 4px;
      width: 4px;
      height: 4px;
      background: var(--accent);
      border-radius: 50%;
    }

    .day.empty {
      cursor: default;
    }

    /* 移动端适配 */
    @media (max-width: 480px) {
      .album-container {
        width: 240px;
        height: 240px;
      }

      .song-title {
        font-size: 24px;
      }

      .recommend-card {
        padding: 20px;
      }

      .quote {
        font-size: 16px;
      }

      .date-nav {
        padding: 8px 16px;
      }

      .current-date {
        font-size: 14px;
        min-width: 80px;
      }
    }

    /* 隐藏滚动条 */
    ::-webkit-scrollbar {
      width: 0;
      height: 0;
    }
  </style>
</head>
<body>
  <!-- 加载动画 -->
  <div class="loading" id="loading">
    <div class="spinner"></div>
  </div>

  <!-- 背景 -->
  <div class="bg-container">
    <img class="bg-image" id="bgImage" src="" alt="">
  </div>
  <div class="bg-overlay"></div>

  <!-- 顶部导航 -->
  <header class="header">
    <div class="date-nav">
      <button class="nav-btn" id="prevBtn">‹</button>
      <span class="current-date" id="currentDate">--</span>
      <button class="nav-btn" id="nextBtn">›</button>
      <div class="date-picker" id="datePicker">
        <div class="date-picker-header">
          <span class="date-picker-title" id="pickerMonth">--</span>
          <div class="date-picker-nav">
            <button class="nav-btn" id="pickerPrev">‹</button>
            <button class="nav-btn" id="pickerNext">›</button>
          </div>
        </div>
        <div class="date-picker-grid" id="pickerGrid"></div>
      </div>
    </div>
    <button class="tag-filter-btn" id="filterBtn">🏷</button>
  </header>

  <!-- 主内容 -->
  <main class="main-content">
    <!-- 唱片 -->
    <div class="album-section">
      <div class="album-container" id="albumContainer">
        <img class="album-cover" id="albumCover" src="" alt="专辑封面">
        <div class="playing-indicator">
          <div class="bar"></div>
          <div class="bar"></div>
          <div class="bar"></div>
          <div class="bar"></div>
        </div>
        <div class="play-overlay" id="playOverlay">
          <div class="play-icon">▶</div>
        </div>
      </div>
    </div>

    <!-- 歌曲信息 -->
    <div class="song-info">
      <h1 class="song-title" id="songTitle">--</h1>
      <p class="song-artist" id="songArtist">--</p>
      <div class="tags" id="tags"></div>
    </div>

    <!-- 推荐卡片 -->
    <div class="recommend-card">
      <p class="quote" id="quote">--</p>
      <p class="description" id="description">--</p>
    </div>

    <!-- 播放器 -->
    <div class="player-section">
      <div class="player-container">
        <div class="player-header">
          <span>🎵</span>
          <span>网易云音乐</span>
        </div>
        <iframe class="player-iframe" id="playerFrame" src="" allow="autoplay"></iframe>
      </div>
      <a class="external-link" id="externalLink" href="#" target="_blank">
            在网易云音乐打开 ↗
          </a>
    </div>
  </main>

  <!-- Logo 水印 -->
  <div class="logo-watermark">
    <img src="https://wangshuang12138-beep.github.io/xca-blog/logo-xca-square.svg" alt="xca">
    <span class="logo-tooltip">xca's pick</span>
  </div>

  <!-- 标签筛选面板 -->
  <div class="filter-panel" id="filterPanel">
    <div class="filter-header">
      <h2 class="filter-title">按标签筛选</h2>
      <button class="close-filter" id="closeFilter">×</button>
    </div>
    <div class="filter-tags" id="filterTags"></div>
    <div class="filter-results" id="filterResults"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
